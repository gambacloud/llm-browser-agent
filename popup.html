<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 350px; padding: 15px; font-family: system-ui, sans-serif; margin: 0; }
        .container { display: flex; flex-direction: column; gap: 12px; }
        input, textarea, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 14px; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #0056b3; }
        #status { font-size: 0.9em; color: #444; margin-top: 5px; white-space: pre-wrap; background: #f1f3f4; padding: 10px; border-radius: 4px; min-height: 40px;}
        .api-section { background: #e9ecef; padding: 12px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="api-section">
            <label for="apiKey">מפתח API (Gemini / Claude):</label>
            <input type="password" id="apiKey" placeholder="הכנס טוקן כאן...">
            <button id="saveKeyBtn">שמור טוקן באחסון מקומי</button>
            <div id="keyStatus" style="color: #198754; font-size: 0.85em; display: none;">הטוקן נשמר בהצלחה!</div>
        </div>

        <label for="prompt">מה תרצה שהסוכן יעשה?</label>
        <textarea id="prompt" rows="3" placeholder="למשל: לחץ על כפתור הלוגין והזן את המייל שלי..."></textarea>
        <button id="runBtn">🚀 בצע פעולה</button>

        <label>סטטוס / לוג:</label>
        <div id="status">ממתין להוראות...</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
