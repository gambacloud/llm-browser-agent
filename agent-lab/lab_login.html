<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Lab - Login</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f1f5f9; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .footer-link { margin-top: 15px; font-size: 13px; text-align: center; }
        .footer-link a { color: #64748b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="margin-top:0; color:#1e293b;">System Login</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">
        <button id="login-btn" onclick="alert('Agent successfully clicked Login!')">Secure Login</button>
        
        <div class="footer-link">
            <a href="lab_dashboard.html" id="forgot-link">Go to Dashboard (Navigation test)</a>
        </div>
    </div>
</body>
</html>
